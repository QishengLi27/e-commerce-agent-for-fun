repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd apps/backend && source venv/bin/activate && ruff check backend/ main.py tests/ --fix'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: bash -c 'cd apps/backend && source venv/bin/activate && ruff format backend/ main.py tests/'
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: bash -c 'cd apps/backend && source venv/bin/activate && mypy backend/ main.py tests/'
        language: system
        types: [python]
        pass_filenames: false
